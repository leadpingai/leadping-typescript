name: Bug report
description: Report a reproducible problem in this SDK.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a Leadping SDK issue. Include enough detail for us to reproduce it."
  - type: input
    id: version
    attributes:
      label: SDK version
      description: The package version you are using.
      placeholder: "1.0.0"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproduction you can.
      placeholder: |
        1. Install package version ...
        2. Call ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Runtime, OS, package manager, and relevant dependency versions.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, stack traces, links, or screenshots.
    validations:
      required: false
