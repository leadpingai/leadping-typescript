name: Feature request
description: Suggest an SDK improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that is hard or unsupported?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the SDK behavior or API you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternatives have you tried?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Examples, links, or related API endpoints.
    validations:
      required: false
