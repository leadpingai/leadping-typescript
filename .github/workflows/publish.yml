name: Publish TypeScript SDK

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - "README.md"
      - "LICENSE"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GIT__TOKEN || secrets.GH__TOKEN || github.token }}

      - name: Prepare version
        id: version
        run: |
          set -euo pipefail

          git fetch --tags --force
          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/ { print; exit }')"

          if [ -z "${latest_tag}" ]; then
            version="1.0.0"
          else
            base="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${base}"
            version="${major}.${minor}.$((patch + 1))"
          fi

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must look like 1.2.3."
            exit 1
          fi

          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists."
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Use npm with trusted publishing support
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm install

      - name: Build package
        env:
          GIT_EMAIL: ${{ secrets.GIT__EMAIL || 'support@leadping.ai' }}
        run: |
          git config user.name "leadpingai-bot"
          git config user.email "${GIT_EMAIL}"

          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version
          git add package.json
          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi
          if ! git diff --cached --quiet; then
            git commit -m "Release ${{ steps.version.outputs.tag }} [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

          npm run build
          mkdir -p artifacts
          npm pack --pack-destination artifacts

      - name: Publish to npm
        run: |
          set -euo pipefail
          npm publish --access public --provenance --registry "https://registry.npmjs.org"

      - name: Publish to GitHub Packages
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GH__TOKEN || secrets.GIT__TOKEN || github.token }}
        run: |
          npm pkg set name=@leadpingai/sdk
          echo "@leadpingai:registry=https://npm.pkg.github.com" > ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${GITHUB_PACKAGES_TOKEN}" >> ~/.npmrc
          npm publish --registry "https://npm.pkg.github.com"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GH__TOKEN || secrets.GIT__TOKEN || github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          git tag "${TAG}"
          git push origin "${TAG}"

          gh release create "${TAG}" artifacts/* \
            --title "${TAG}" \
            --notes "Generated Leadping TypeScript SDK ${TAG}."
