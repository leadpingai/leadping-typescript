name: Publish TypeScript SDK

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GIT__TOKEN || secrets.GH__TOKEN || github.token }}

      - name: Prepare version
        id: version
        run: |
          set -euo pipefail

          versions_file="$(mktemp)"
          git fetch --tags --force

          git tag --list 'v[0-9]*.[0-9]*.[0-9]*' |
            sed -E 's/^v//' |
            awk '/^[0-9]+\.[0-9]+\.[0-9]+$/ { print }' >> "${versions_file}"

          npm_response="$(mktemp)"
          if curl -fsSL "https://registry.npmjs.org/@leadping%2Fsdk" -o "${npm_response}"; then
            python3 - "${npm_response}" <<'PY' >> "${versions_file}"
          import json
          import re
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              data = json.load(handle)

          for version in data.get("versions", {}):
              if re.fullmatch(r"\d+\.\d+\.\d+", version):
                  print(version)
          PY
          fi

          version="$(python3 - "${versions_file}" <<'PY'
          import re
          import sys

          best = None
          with open(sys.argv[1], encoding="utf-8") as handle:
              for line in handle:
                  version = line.strip()
                  if not re.fullmatch(r"\d+\.\d+\.\d+", version):
                      continue

                  parsed = tuple(int(part) for part in version.split("."))
                  if best is None or parsed > best:
                      best = parsed

          if best is None:
              print("1.0.0")
          else:
              major, minor, patch = best
              print(f"{major}.{minor}.{patch + 1}")
          PY
          )"

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must look like 1.2.3."
            exit 1
          fi

          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists."
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Use npm with trusted publishing support
        run: npm install --global npm@^11.5.1

      - name: Install dependencies
        run: npm install

      - name: Build package
        env:
          GIT_EMAIL: ${{ secrets.GIT__EMAIL || 'support@leadping.ai' }}
        run: |
          git config user.name "leadpingai-bot"
          git config user.email "${GIT_EMAIL}"

          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version
          git add package.json
          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi
          if ! git diff --cached --quiet; then
            git commit -m "Release ${{ steps.version.outputs.tag }} [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

          npm run build
          mkdir -p artifacts
          npm pack --pack-destination artifacts

      - name: Verify npm trusted publishing context
        run: |
          set -euo pipefail

          node --version
          npm --version

          if [ -n "${NPM_TOKEN:-}" ] || [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN/NODE_AUTH_TOKEN must not be set for npm trusted publishing."
            exit 1
          fi

          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "::error::GitHub OIDC environment is unavailable. Check id-token: write permissions and use a GitHub-hosted runner."
            exit 1
          fi

      - name: Publish to npm
        env:
          NPM_CONFIG_PROVENANCE: false
        run: |
          set -euo pipefail
          npm publish --access public --registry "https://registry.npmjs.org"

      - name: Publish to GitHub Packages
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GH__TOKEN || secrets.GIT__TOKEN || github.token }}
        run: |
          npm pkg set name=@leadpingai/sdk
          echo "@leadpingai:registry=https://npm.pkg.github.com" > ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${GITHUB_PACKAGES_TOKEN}" >> ~/.npmrc
          npm publish --registry "https://npm.pkg.github.com"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GH__TOKEN || secrets.GIT__TOKEN || github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          git tag "${TAG}"
          git push origin "${TAG}"

          gh release create "${TAG}" artifacts/* \
            --title "${TAG}" \
            --notes "Generated Leadping TypeScript SDK ${TAG}."
