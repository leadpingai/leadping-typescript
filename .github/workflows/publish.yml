name: Publish TypeScript SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish, without a leading v.
        required: true
      prerelease:
        description: Mark the GitHub release as a prerelease.
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GIT__TOKEN || secrets.GH__TOKEN || github.token }}

      - name: Prepare version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail

          version="${VERSION_INPUT#v}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version must look like 1.2.3 or 1.2.3-preview.1."
            exit 1
          fi

          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists."
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Build package
        env:
          GIT_EMAIL: ${{ secrets.GIT__EMAIL || 'support@leadping.ai' }}
        run: |
          git config user.name "leadpingai-bot"
          git config user.email "${GIT_EMAIL}"

          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version
          git add package.json
          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi
          git commit -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "HEAD:${{ github.ref_name }}"

          npm run build
          mkdir -p artifacts
          npm pack --pack-destination artifacts

      - name: Publish to npm
        run: |
          set -euo pipefail
          npm publish --access public --registry "https://registry.npmjs.org"

      - name: Publish to GitHub Packages
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GH__TOKEN || secrets.GIT__TOKEN || github.token }}
        run: |
          echo "@leadpingai:registry=https://npm.pkg.github.com" > ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${GITHUB_PACKAGES_TOKEN}" >> ~/.npmrc
          npm publish --registry "https://npm.pkg.github.com"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GH__TOKEN || secrets.GIT__TOKEN || github.token }}
          PRERELEASE: ${{ inputs.prerelease }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          git tag "${TAG}"
          git push origin "${TAG}"

          prerelease_flag=()
          if [ "${PRERELEASE}" = "true" ]; then
            prerelease_flag=(--prerelease)
          fi

          gh release create "${TAG}" artifacts/* \
            --title "${TAG}" \
            --notes "Generated Leadping TypeScript SDK ${TAG}." \
            "${prerelease_flag[@]}"
